<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sri Varasidhi Vinayakha Utsava Committee - Login</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Noto+Sans+Telugu:wght@600;700;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:#000;
}

button,
input{
    font:inherit;
}

/* LOGIN PAGE ONLY */
.page{
    position:relative;
    width:100%;
    height:100vh;
    height:100svh;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
}

.bg-img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    filter:blur(10px);
    transform:scale(1.15);
    z-index:0;
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.30);
    z-index:1;
}

.top-title{
    position:fixed;
    top:calc(env(safe-area-inset-top, 0px) + 16px);
    left:50%;
    transform:translateX(-50%);
    width:calc(100% - 28px);
    max-width:760px;
    z-index:100;
    text-align:center;
    pointer-events:none;
    opacity:1;
}


.top-title h1{
    font-family:'Cinzel', serif;
    font-size:31px;
    font-weight:900;
    line-height:1.18;
    letter-spacing:1.2px;
    text-transform:uppercase;
    background:linear-gradient(
        180deg,
        #fff8c7 0%,
        #ffd700 38%,
        #c98b00 72%,
        #fff1a8 100%
    );
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
}

.main-stack{
    position:relative;
    z-index:5;
    width:100%;
    height:100%;
    padding:72px 0 85px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.center-wrap{
    position:relative;
    width:320px;
    height:245px;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    transform:translateY(-22px);
}


.front-img{
    width:220px;
    height:190px;
    object-fit:contain;
    display:block;
    position:relative;
    z-index:5;
}
.flower-layer{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:220px;
    height:190px;
    z-index:8;
    pointer-events:none;
    overflow:hidden;
}

.flower{
    position:absolute;
    top:-45px;
    opacity:0;
    animation:fallFlower linear forwards;
}

@keyframes fallFlower{
    0%{
        transform:translateY(0) translateX(0) rotate(0deg) scale(.8);
        opacity:0;
    }
    12%{opacity:1;}
    35%{
        transform:translateY(60px) translateX(var(--drift1)) rotate(120deg) scale(1);
        opacity:1;
    }
    70%{
        transform:translateY(125px) translateX(var(--drift2)) rotate(250deg) scale(1);
        opacity:1;
    }
    100%{
        transform:translateY(230px) translateX(var(--drift3)) rotate(360deg) scale(.85);
        opacity:0;
    }
}

.chant-line{
    position:relative;
    width:calc(100% - 30px);
    max-width:370px;
    min-height:52px;
    margin-top:-10px;
    margin-bottom:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:#ffe680;
    font-family:'Noto Sans Telugu', sans-serif;
    font-size:18px;
    font-weight:800;
    line-height:1.35;
}

.chant-word{
    display:inline-block;
    margin:0 2px;
    color:#ffe680;
    opacity:.45;
    transition:opacity .45s ease, color .45s ease, transform .45s ease;
}

.chant-word.active{
    color:#fff;
    opacity:1;
    transform:translateY(-2px) scale(1.06);
}

.login-area{
    position:relative;
    width:92%;
    max-width:360px;
    z-index:10;
    flex-shrink:0;
    margin-top:38px;
}

.login-box{
    width:100%;
    padding:0 12px;
    color:#fff;
    text-align:center;
}

.login-step{
    display:none;
}

.login-step.active{
    display:block;
    animation:stepShow .35s ease forwards;
}

@keyframes stepShow{
    from{
        opacity:0;
        transform:translateX(18px);
    }
    to{
        opacity:1;
        transform:translateX(0);
    }
}

.login-box h2{
    font-size:30px;
    font-weight:900;
    margin-bottom:10px;
    color:#fff;
    text-shadow:0 0 12px rgba(255,215,0,.45);
}

.login-box p{
    font-size:15px;
    font-weight:700;
    color:#ffe680;
    margin-bottom:20px;
}

.mobile-line,
.password-line{
    width:100%;
    display:flex;
    align-items:center;
    gap:8px;
    border-bottom:2px solid rgba(255,230,128,.95);
    padding-bottom:9px;
    margin-bottom:24px;
}

.country-code{
    color:#fff;
    font-size:17px;
    font-weight:800;
}

.mobile-line input,
.password-line input{
    width:100%;
    border:none;
    outline:none;
    background:transparent;
    color:#fff;
    font-size:17px;
    font-weight:800;
    letter-spacing:1px;
}

.mobile-line input::placeholder,
.password-line input::placeholder{
    color:rgba(255,255,255,.65);
    font-weight:600;
}

.login-btn{
    width:100%;
    height:48px;
    border:none;
    outline:none;
    border-radius:30px;
    background:linear-gradient(135deg,#d4af37,#b8860b,#8b6508);
    color:#fff;
    font-size:16px;
    font-weight:900;
    cursor:pointer;
    box-shadow:0 0 14px rgba(212,175,55,.75), 0 8px 20px rgba(0,0,0,.28);
}

.login-btn:active{
    transform:scale(.98);
}

.back-btn{
    margin-top:16px;
    border:none;
    background:transparent;
    color:#ffe680;
    font-size:14px;
    font-weight:800;
    cursor:pointer;
}

.login-status{
    min-height:20px;
    margin-top:14px;
    color:#fff;
    font-size:14px;
    font-weight:800;
}

.login-status.success{
    color:#c8ffb5;
}

.login-status.error{
    color:#ffb4b4;
}

.shake{
    animation:shake .35s ease;
}

@keyframes shake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-6px);}
    50%{transform:translateX(6px);}
    75%{transform:translateX(-4px);}
}

.moving-line{
    position:fixed;
    left:0;
    right:0;
    bottom:8px;
    width:100vw;
    height:58px;
    z-index:9;
    overflow:hidden;
    pointer-events:none;
}

.moving-track{
    height:100%;
    display:inline-flex;
    align-items:center;
    gap:12px;
    white-space:nowrap;
    padding-left:100vw;
    animation:moveRightToLeft 10s linear infinite;
}

.line-img{
    width:52px;
    height:52px;
    object-fit:contain;
    flex-shrink:0;
}

.line-text{
    color:#ffd700;
    font-size:15px;
    font-weight:900;
    letter-spacing:.4px;
}

@keyframes moveRightToLeft{
    from{transform:translateX(0);}
    to{transform:translateX(-100%);}
}

@media(max-width:768px){
    .bg-img{
        filter:blur(9px);
        transform:scale(1.18);
    }

    .top-title{
        top:calc(env(safe-area-inset-top, 0px) + 90px);
        width:calc(100% - 24px);
    }

    .top-title h1{
        font-size:18px;
        line-height:1.25;
        letter-spacing:.7px;
    }

    .main-stack{
        padding:58px 0 240px;
    }

    .center-wrap{
        width:280px;
        height:175px;
        transform:translateY(-10px);
    }

    .image-box{
        width:205px;
        height:165px;
        border-radius:18px;
    }

    .front-img{
    width:205px;
    height:165px;
}

.flower-layer{
    width:205px;
    height:165px;
}
.front-img{
    width:175px;
    height:135px;
}

.flower-layer{
    width:175px;
    height:135px;
}
    .chant-line{
        width:calc(100vw - 34px);
        max-width:340px;
        min-height:48px;
        margin-top:2px;
        margin-bottom:0;
        font-size:15px;
        line-height:1.45;
    }

    .login-area{
        position:fixed;
        left:50%;
        bottom:calc(78px + env(safe-area-inset-bottom));
        width:calc(100vw - 48px);
        max-width:340px;
        margin:0;
        transform:translateX(-50%);
    }

    .login-box{
        padding:0;
    }

    .login-box h2{
        font-size:27px;
        margin-bottom:8px;
    }

    .login-box p{
        font-size:14px;
        margin-bottom:18px;
    }

    .mobile-line,
    .password-line{
        padding-bottom:8px;
        margin-bottom:22px;
    }

    .mobile-line input,
    .password-line input,
    .country-code{
        font-size:16px;
    }

    .login-btn{
        height:45px;
        font-size:15px;
    }

    .moving-line{
        bottom:calc(8px + env(safe-area-inset-bottom));
        height:56px;
    }

    .line-img{
        width:50px;
        height:50px;
    }

    .line-text{
        font-size:14px;
    }
}

@media(max-width:768px) and (max-height:650px){
   .top-title{
        top:calc(env(safe-area-inset-top, 0px) + 8px);
    }

    .top-title h1{
        font-size:15px;
    }

    .main-stack{
        padding:40px 0 215px;
    }

    .center-wrap{
        height:135px;
    }

    .image-box{
        width:175px;
        height:135px;
    }

    .chant-line{
        min-height:38px;
        font-size:12px;
    }

    .login-area{
        bottom:calc(58px + env(safe-area-inset-bottom));
    }

    .login-box h2{
        font-size:22px;
    }

    .login-box p{
        margin-bottom:12px;
        font-size:12px;
    }

    .mobile-line,
    .password-line{
        margin-bottom:15px;
    }

    .login-btn{
        height:39px;
    }

    .back-btn{
        margin-top:8px;
    }

    .login-status{
        margin-top:8px;
    }

    .moving-line{
        height:48px;
    }

    .line-img{
        width:42px;
        height:42px;
    }
}
.spinner{
    width:20px;
    height:20px;
    position:relative;
    margin:auto;
}

.spinner div{
    position:absolute;
    left:9px;
    top:1px;
    width:2px;
    height:6px;
    border-radius:2px;
    background:#fff;
    transform-origin:1px 9px;
    animation:spinnerFade 1.2s linear infinite;
}

.spinner div:nth-child(1){transform:rotate(0deg);animation-delay:-1.1s;}
.spinner div:nth-child(2){transform:rotate(30deg);animation-delay:-1s;}
.spinner div:nth-child(3){transform:rotate(60deg);animation-delay:-0.9s;}
.spinner div:nth-child(4){transform:rotate(90deg);animation-delay:-0.8s;}
.spinner div:nth-child(5){transform:rotate(120deg);animation-delay:-0.7s;}
.spinner div:nth-child(6){transform:rotate(150deg);animation-delay:-0.6s;}
.spinner div:nth-child(7){transform:rotate(180deg);animation-delay:-0.5s;}
.spinner div:nth-child(8){transform:rotate(210deg);animation-delay:-0.4s;}
.spinner div:nth-child(9){transform:rotate(240deg);animation-delay:-0.3s;}
.spinner div:nth-child(10){transform:rotate(270deg);animation-delay:-0.2s;}
.spinner div:nth-child(11){transform:rotate(300deg);animation-delay:-0.1s;}
.spinner div:nth-child(12){transform:rotate(330deg);animation-delay:0s;}

@keyframes spinnerFade{
    0%{opacity:1;}
    100%{opacity:.15;}
}

</style>
 

</head>

<body>
<div class="page" id="loginPage">
    <!-- Keep these image files in the same folder as this HTML file -->

        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
'use strict';
const SUPABASE_URL = 'https://rxdckizxuvmlhwpuyydk.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_A_DfGloUYAWEekfzr2y5FQ_gexKf4c4';

const supabaseClient = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

console.log('Supabase client connected:', supabaseClient);
/* LOCAL LOGIN ONLY - NO DATABASE OR SERVER */

const flowerLayer = document.getElementById('flowerLayer');
const flowerSymbols = ['🌸', '🌼', '🌺', '🌸', '🌼'];

function createFlower(){
    if(!flowerLayer) return;

    const flower = document.createElement('span');
    flower.className = 'flower';
    flower.textContent = flowerSymbols[Math.floor(Math.random() * flowerSymbols.length)];

    const layerWidth = flowerLayer.clientWidth || 200;
    const duration = 2.8 + Math.random() * 1.5;

    flower.style.left = Math.random() * Math.max(layerWidth - 28, 1) + 'px';
    flower.style.fontSize = 18 + Math.random() * 10 + 'px';
    flower.style.animationDuration = duration + 's';
    flower.style.setProperty('--drift1', (Math.random() * 24 - 12) + 'px');
    flower.style.setProperty('--drift2', (Math.random() * 30 - 15) + 'px');
    flower.style.setProperty('--drift3', (Math.random() * 24 - 12) + 'px');

    flowerLayer.appendChild(flower);
    window.setTimeout(() => flower.remove(), duration * 1000);
}

window.setInterval(createFlower, 220);
for(let i = 0; i < 10; i++){
    window.setTimeout(createFlower, i * 140);
}

const chantLines = [
    'గణనాయకాయ, గణదైవతాయ',
    'గనదక్షాయ ధీమహీ',
    'గుణ శరీరాయ, గుణ మండితాయ',
    'గుణేషాయ ధీమహీ',
    'ఏకదంతాయ, వక్రతుండాయ',
    'గౌరీ తనయాయ ధీమహి',
    'గజేషాణాయ, బాలాచంద్రాయ',
    'శ్రీ గణేషాయ ధీమహి'
];

const chantText = document.getElementById('chantText');
let chantLineIndex = 0;

function showChantLine(){
    const words = chantLines[chantLineIndex].split(/\s+/).filter(Boolean);
    chantText.innerHTML = '';

    words.forEach(word => {
        const span = document.createElement('span');
        span.className = 'chant-word';
        span.textContent = word;
        chantText.appendChild(span);
        chantText.appendChild(document.createTextNode(' '));
    });

    const wordElements = chantText.querySelectorAll('.chant-word');
    let wordIndex = 0;

    function highlightWord(){
        wordElements.forEach(word => word.classList.remove('active'));

        if(wordIndex < wordElements.length){
            wordElements[wordIndex].classList.add('active');
            wordIndex += 1;
            window.setTimeout(highlightWord, 850);
            return;
        }

        chantLineIndex = (chantLineIndex + 1) % chantLines.length;
        window.setTimeout(showChantLine, 1200);
    }

    window.setTimeout(highlightWord, 400);
}

showChantLine();

const mobileStep = document.getElementById('mobileStep');
const passwordStep = document.getElementById('passwordStep');
const mobileInput = document.getElementById('mobileInput');
const passwordInput = document.getElementById('passwordInput');
const mobileLine = document.getElementById('mobileLine');
const passwordLine = document.getElementById('passwordLine');
const mobileNextBtn = document.getElementById('mobileNextBtn');
const loginBtn = document.getElementById('loginBtn');
const backBtn = document.getElementById('backBtn');
const loginStatus = document.getElementById('loginStatus');
let customerApprovalChannel = null;

const iphoneSpinner = `
<div class="spinner">
    <div></div><div></div><div></div><div></div>
    <div></div><div></div><div></div><div></div>
    <div></div><div></div><div></div><div></div>
</div>`;
function shakeElement(element){
    element.classList.remove('shake');
    void element.offsetWidth;
    element.classList.add('shake');
}

function setStatus(message, type = ''){
    loginStatus.textContent = message;
    loginStatus.className = 'login-status' + (type ? ' ' + type : '');
}

function showPasswordStep(){
    mobileStep.classList.remove('active');
    passwordStep.classList.add('active');
    setStatus('');
    window.history.pushState({step:'password'}, '', '#password');
    window.setTimeout(() => passwordInput.focus(), 150);
}

function showMobileStep(updateHistory = false){
    passwordStep.classList.remove('active');
    mobileStep.classList.add('active');
    passwordInput.value = '';
    setStatus('');

    if(updateHistory){
        window.history.replaceState({step:'mobile'}, '', window.location.pathname + window.location.search);
    }

    window.setTimeout(() => mobileInput.focus(), 150);
}

mobileInput.addEventListener('input', function(){
    this.value = this.value.replace(/\D/g, '').slice(0, 10);

    stopCustomerApprovalListener();

    mobileNextBtn.disabled = false;
    mobileNextBtn.innerHTML = 'Next';

    setStatus('');
});

passwordInput.addEventListener('input', () => setStatus(''));
function stopCustomerApprovalListener(){
    if(customerApprovalChannel){
        supabaseClient.removeChannel(customerApprovalChannel);
        customerApprovalChannel = null;
    }
}

let customerRedirecting = false;

function customerLoginSuccess(mobileNumber){

    if(customerRedirecting) return;
    customerRedirecting = true;

    stopCustomerApprovalListener();

    localStorage.setItem("loginRole","customer");
    localStorage.setItem("loggedInUser",mobileNumber);
    localStorage.setItem("loggedInName","Customer");
    localStorage.setItem("customerApprovalStatus","accepted");

    setStatus("Your request has been accepted", "success");

    // Redirect immediately
    location.replace("homepage.html");
}

function showCustomerStatus(status, mobileNumber){
    const currentStatus = String(status || 'pending').toLowerCase();

    if(currentStatus === "accepted"){
    customerLoginSuccess(mobileNumber);
    return;
}

    if(currentStatus === 'declined'){
        setStatus(
            'Your approval request was declined. Please contact the administrator.',
            'error'
        );

        mobileNextBtn.disabled = false;
        mobileNextBtn.innerHTML = 'Request Again';
        return;
    }

    if(currentStatus === 'rejected'){
        setStatus(
            'Your approval request was rejected by the administrator.',
            'error'
        );

        mobileNextBtn.disabled = false;
        mobileNextBtn.innerHTML = 'Request Again';
        return;
    }

    setStatus(
        'Waiting for admin approval',
        ''
    );

    mobileNextBtn.disabled = true;
    mobileNextBtn.innerHTML = iphoneSpinner;
}

function listenForCustomerApproval(mobileNumber){
    stopCustomerApprovalListener();

    customerApprovalChannel = supabaseClient
        .channel('customer-approval-' + mobileNumber)
        .on(
            'postgres_changes',
            {
                event: 'UPDATE',
                schema: 'public',
                table: 'customer_approvals',
                filter: `mobile_number=eq.${mobileNumber}`
            },
            function(payload){
                console.log('Customer approval changed:', payload.new);

                if(payload.new){
                    showCustomerStatus(
                        payload.new.status,
                        mobileNumber
                    );
                }
            }
        )
        .subscribe(function(status, error){
            console.log('Approval realtime status:', status);

            if(error){
                console.error('Approval realtime error:', error);
            }
        });
}

async function createOrCheckCustomerRequest(mobileNumber){
    const { data: existingRequest, error: readError } =
        await supabaseClient
            .from('customer_approvals')
            .select('mobile_number, status')
            .eq('mobile_number', mobileNumber)
            .maybeSingle();

    if(readError){
        throw readError;
    }

    if(existingRequest){
        showCustomerStatus(
            existingRequest.status,
            mobileNumber
        );

        if(existingRequest.status === 'pending'){
            listenForCustomerApproval(mobileNumber);
        }

        return;
    }

    const { data: newRequest, error: insertError } =
        await supabaseClient
            .from('customer_approvals')
            .insert({
                mobile_number: mobileNumber,
                status: 'pending'
            })
            .select('mobile_number, status')
            .single();

    if(insertError){
        throw insertError;
    }

    showCustomerStatus(
        newRequest.status,
        mobileNumber
    );

    listenForCustomerApproval(mobileNumber);
}

mobileNextBtn.addEventListener('click', async function(){

    const enteredMobile = mobileInput.value.trim();

    if(!/^[0-9]{10}$/.test(enteredMobile)){
        shakeElement(mobileLine);
        setStatus(
            'Enter a valid 10-digit mobile number.',
            'error'
        );

        mobileInput.focus();
        return;
    }

    stopCustomerApprovalListener();

    mobileNextBtn.disabled = true;
    mobileNextBtn.innerHTML = iphoneSpinner;
    setStatus('');

    try{
        /*
         * STEP 1:
         * Check whether this number is an administrator.
         */
        const { data: adminData, error: adminError } =
            await supabaseClient
                .from('admin_login')
                .select('mobile_number')
                .eq('mobile_number', enteredMobile)
                .maybeSingle();

        if(adminError){
            throw adminError;
        }

        /*
         * ADMIN:
         * Show password screen.
         */
        if(adminData){
            mobileNextBtn.disabled = false;
            mobileNextBtn.innerHTML = 'Next';

            showPasswordStep();
            return;
        }

        /*
         * CUSTOMER:
         * No password. Create/check approval request.
         */
        await createOrCheckCustomerRequest(enteredMobile);

    }catch(error){
        console.error('Mobile login error:', error);

        setStatus(
            'Unable to send approval request. Please try again.',
            'error'
        );

        mobileNextBtn.disabled = false;
        mobileNextBtn.innerHTML = 'Next';
    }
});

loginBtn.addEventListener('click', async function(){

    const enteredMobile = mobileInput.value.trim();
    const enteredPassword = passwordInput.value;

    if(enteredPassword.trim() === ''){
        shakeElement(passwordLine);
        setStatus('Enter your password.', 'error');
        passwordInput.focus();
        return;
    }

  loginBtn.disabled = true;
loginBtn.innerHTML = `
<div class="spinner">
    <div></div><div></div><div></div><div></div>
    <div></div><div></div><div></div><div></div>
    <div></div><div></div><div></div><div></div>
</div>`;
    setStatus('Checking password...');

    try{
        const { data, error } = await supabaseClient
            .from('admin_login')
            .select('mobile_number, password, role, name')
            .eq('mobile_number', enteredMobile)
            .eq('password', enteredPassword)
            .maybeSingle();

        if(error){
            console.error('Admin login error:', error);
            setStatus('Unable to check password.', 'error');
            return;
        }

        if(!data){
            shakeElement(passwordLine);
            setStatus('Incorrect password.', 'error');
            passwordInput.focus();
            return;
        }

        localStorage.setItem('loginRole', data.role || 'admin');
        localStorage.setItem('loggedInUser', data.mobile_number);
        localStorage.setItem('loggedInName', data.name || 'Administrator');

        setStatus('Admin login successful.', 'success');

        window.setTimeout(function(){
            window.location.href = 'homepage.html';
        }, 400);

    }catch(error){
        console.error('Password check failed:', error);
        setStatus('Something went wrong. Try again.', 'error');

    }finally{
        loginBtn.disabled = false;
        loginBtn.innerHTML = 'Login';
    }
});
backBtn.addEventListener('click', function(){
    if(window.location.hash === '#password'){
        window.history.back();
    }else{
        showMobileStep(true);
    }
});

mobileInput.addEventListener('keydown', function(event){
    if(event.key === 'Enter') mobileNextBtn.click();
});

passwordInput.addEventListener('keydown', function(event){
    if(event.key === 'Enter') loginBtn.click();
});

window.history.replaceState({step:'mobile'}, '', window.location.pathname + window.location.search);

window.addEventListener('popstate', function(){
    showMobileStep(false);
});
</script>
</body>
</html>
